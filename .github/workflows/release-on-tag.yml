name: Release on Tag

# Triggered by pushing a version tag, e.g.: git tag v1.3.0 && git push origin v1.3.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to push the version-bump commit and create the release
  id-token: write   # needed for PyPI Trusted Publishing (OIDC)

jobs:
  release:
    name: Bump version, update changelog, release, publish
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout – full history so we can push the bump commit back
      # -----------------------------------------------------------------------
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # PAT required because main is branch-protected (GITHUB_TOKEN cannot push there)
          token: ${{ secrets.PAT_TOKEN }}

      # -----------------------------------------------------------------------
      # 2. Derive version from tag (strips the leading "v")
      # -----------------------------------------------------------------------
      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"      # e.g. v1.3.0
          VERSION="${TAG#v}"                   # e.g. 1.3.0
          echo "TAG=$TAG"         >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # -----------------------------------------------------------------------
      # 3. Update __version__.py
      #    os.environ["VERSION"] is used so the shell variable is visible to Python.
      # -----------------------------------------------------------------------
      - name: Update __version__.py
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          python - << 'EOF'
          import re, pathlib, os
          version = os.environ["VERSION"]
          p = pathlib.Path("collectmeteranalog/__version__.py")
          content = re.sub(
              r'__version__\s*=\s*["\'][^"\']*["\']',
              f'__version__ = "{version}"',
              p.read_text()
          )
          p.write_text(content)
          print(f"Set __version__ = {version!r}")
          EOF

      # -----------------------------------------------------------------------
      # 4. Update CHANGELOG.md  →  [Unreleased] becomes [VERSION] - DATE
      #    A fresh empty [Unreleased] section is kept at the top.
      # -----------------------------------------------------------------------
      - name: Update CHANGELOG.md
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          python - << 'EOF'
          import pathlib, datetime, os
          version = os.environ["VERSION"]
          today = datetime.date.today().isoformat()
          p = pathlib.Path("CHANGELOG.md")
          content = p.read_text()
          content = content.replace(
              "## [Unreleased]",
              f"## [Unreleased]\n\n## [{version}] - {today}",
              1
          )
          p.write_text(content)
          print(f"Promoted [Unreleased] to [{version}] - {today}")
          EOF

      # -----------------------------------------------------------------------
      # 5. Extract the release notes for this version (used as GitHub Release body)
      # -----------------------------------------------------------------------
      - name: Extract release notes
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          python - << 'EOF'
          import pathlib, re, os
          version = os.environ["VERSION"]
          content = pathlib.Path("CHANGELOG.md").read_text()
          pattern = rf"## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n## |\Z)"
          match = re.search(pattern, content, re.DOTALL)
          notes = match.group(1).strip() if match else "No release notes."
          pathlib.Path("release_notes.md").write_text(notes)
          print(notes)
          EOF

      # -----------------------------------------------------------------------
      # 6. Commit version bump back to main
      # -----------------------------------------------------------------------
      - name: Commit and push version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add collectmeteranalog/__version__.py CHANGELOG.md
          git commit -m "chore: release ${{ steps.version.outputs.TAG }}"
          git push origin HEAD:main

      # -----------------------------------------------------------------------
      # 7. Create GitHub Release
      # -----------------------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: ${{ steps.version.outputs.TAG }}
          body_path: release_notes.md
          draft: false
          prerelease: false

      # -----------------------------------------------------------------------
      # 8. Build and publish to PyPI
      # -----------------------------------------------------------------------
      - name: Install build tools
        run: python -m pip install --upgrade pip build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.12.4
