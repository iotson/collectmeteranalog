name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  # ============================================================
  # JOB 1: Tests + Coverage + SCA (pip-audit) + SAST (Bandit)
  # ============================================================
  test:
    name: Tests, Coverage, SCA & SAST (Bandit)
    runs-on: ubuntu-latest

    env:
      QT_QPA_PLATFORM: offscreen
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Qt system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libgl1 libegl1 libxkbcommon0 libdbus-1-3

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      # --------------------------------------------------------
      # Tests mit Coverage
      # --------------------------------------------------------
      - name: Run pytest with coverage
        run: |
          pytest tests/ \
            --cov=collectmeteranalog \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

      # --------------------------------------------------------
      # SCA: pip-audit (CVE-Scanning der Abhängigkeiten)
      # --------------------------------------------------------
      - name: Install pip-audit
        if: always()
        run: pip install pip-audit

      - name: Run pip-audit (SCA)
        if: always()
        run: |
          pip-audit \
            --requirement requirements.txt \
            --format json \
            -o pip-audit-report.json

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: pip-audit-report.json

      # --------------------------------------------------------
      # SAST: Bandit (Python-spezifische Sicherheitsanalyse)
      # --------------------------------------------------------
      - name: Install bandit
        if: always()
        run: pip install bandit[toml]

      - name: Run bandit (SAST)
        if: always()
        run: |
          bandit \
            -r collectmeteranalog/ \
            -f json \
            -o bandit-report.json \
            --severity-level medium \
            --confidence-level medium

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json

  # ============================================================
  # JOB 2: CodeQL (SAST - separater Job wegen security-events-Permission)
  # ============================================================
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"
